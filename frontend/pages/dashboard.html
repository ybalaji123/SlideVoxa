<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — SlideVoxa.ai</title>
    <meta name="description" content="Your SlideVoxa dashboard — manage and start your AI presentations." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/global.css" />
    <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>

<body class="app-page">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <rect width="36" height="36" rx="10" fill="url(#sideLogoGrad)" />
                    <text x="4" y="26" font-size="18" font-weight="900" fill="white" font-family="Inter">SV</text>
                    <defs>
                        <linearGradient id="sideLogoGrad" x1="0" y1="0" x2="36" y2="36">
                            <stop offset="0%" stop-color="#00C6FF" />
                            <stop offset="100%" stop-color="#7B2FFF" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span class="logo-text">SLIDE<span class="logo-voxa">VOXA</span></span>
        </div>

        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item active" id="nav-dashboard">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                </svg>
                Dashboard
            </a>
            <a href="/upload" class="nav-item" id="nav-upload">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                New Presentation
            </a>
        </nav>

        <div class="sidebar-user" id="sidebar-user">
            <div class="user-avatar" id="user-avatar-img"></div>
            <div class="user-info">
                <p class="user-name" id="user-name">User</p>
                <p class="user-email" id="user-email">—</p>
            </div>
            <button class="logout-btn" id="logout-btn" title="Sign out">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- TOP BAR -->
        <header class="topbar">
            <div>
                <h1 class="topbar-title">Dashboard</h1>
                <p class="topbar-sub">Manage your AI-powered presentations</p>
            </div>
            <a href="/upload" class="btn btn-primary" id="new-pres-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                New Presentation
            </a>
        </header>

        <!-- STATS -->
        <div class="stats-row" id="stats-row">
            <div class="stat-card">
                <div class="stat-icon" style="--sc:#00C6FF">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" />
                        <line x1="8" y1="21" x2="16" y2="21" />
                        <line x1="12" y1="17" x2="12" y2="21" />
                    </svg>
                </div>
                <div>
                    <p class="stat-value" id="total-count">0</p>
                    <p class="stat-label">Total Presentations</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="--sc:#00FF88">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                </div>
                <div>
                    <p class="stat-value" id="ready-count">0</p>
                    <p class="stat-label">Ready to Present</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="--sc:#FF6B35">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                </div>
                <div>
                    <p class="stat-value" id="processing-count">0</p>
                    <p class="stat-label">Processing</p>
                </div>
            </div>
        </div>

        <!-- PRESENTATIONS LIST -->
        <section class="presentations-section">
            <div class="section-title-row">
                <h2 class="dash-section-title">My Presentations</h2>
                <button class="btn btn-ghost btn-sm" id="refresh-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="1 4 1 10 7 10" />
                        <path d="M3.51 15a9 9 0 1 0 .49-4.49" />
                    </svg>
                    Refresh
                </button>
            </div>

            <div class="pres-grid" id="pres-grid">
                <div class="pres-loading">
                    <div class="spinner spinner-lg"></div>
                    <p>Loading presentations...</p>
                </div>
            </div>
        </section>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/dashboard.js"></script>
</body>

</html>
